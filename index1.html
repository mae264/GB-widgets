<!DOCTYPE html>
<html>
<head>
    <style>
        body { font-family: sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; }
        table { border-collapse: collapse; width: 100%; max-width: 400px; margin-top: 10px; }
        th, td { border: 1px solid #ccc; padding: 0; height: 35px; text-align: center; }
        th { background-color: #f2f2f2; font-size: 14px; }
        input { width: 100%; height: 100%; border: none; text-align: center; outline: none; background: transparent; }
        input:focus { background-color: #e8f0fe; }
        .btn-clear { margin-top: 10px; padding: 5px 10px; cursor: pointer; font-size: 12px; border: 1px solid #ccc; background: #fff; }
    </style>
</head>
<body>
    <table>
        <tr><th colspan="2">Example Problem 1</th></tr>
        <tr><th colspan="2">Humanual level Walk-through</th></tr>
        <tr style="font-weight: bold;">
            <td>Input (Num)</td>
            <td>Output (Sum)</td>
        </tr>
        <tr><td><input type="text"></td><td><input type="text"></td></tr>
        <tr><td><input type="text"></td><td><input type="text"></td></tr>
        <tr><td><input type="text"></td><td><input type="text"></td></tr>
        <tr><td><input type="text"></td><td><input type="text"></td></tr>
        <tr><td><input type="text"></td><td><input type="text"></td></tr>
        <tr><td><input type="text"></td><td><input type="text"></td></tr>
    </table>
    <button class="btn-clear" onclick="document.querySelectorAll('input').forEach(i => i.value='')">Clear Table</button>
</body>
</html>
